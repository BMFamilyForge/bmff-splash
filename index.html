<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blue Mountain Family Forge | Coming Soon</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a24;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 800px;
            padding: 40px;
            background: #232332;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(255, 102, 0, 0.15);
            border-top: 4px solid #ff6600;
            margin: 20px;
        }
        .concept-art {
            width: 100%;
            max-width: 600px;
            border-radius: 8px;
            margin-bottom: 20px;
            border: 2px solid #3a3a55;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h1 {
            font-size: 2.8em;
            margin-bottom: 10px;
            letter-spacing: 1px;
        }
        .accent {
            color: #ff6600;
        }
        p {
            font-size: 1.2em;
            line-height: 1.6;
            color: #b0b0c0;
            margin-bottom: 30px;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 30px;
        }
        .badge {
            background: #2a2a3d;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 1em;
            color: #e0e0e0;
            border: 1px solid #3a3a55;
        }
        .social-link {
            display: inline-block;
            padding: 12px 24px;
            background-color: #ff6600;
            color: white;
            text-decoration: none;
            border-radius: 4px;
            font-size: 1.1em;
            font-weight: bold;
            transition: background 0.3s;
        }
        .social-link:hover {
            background-color: #e65c00;
        }
    </style>
</head>
<body>

    <div class="container">
        <img src="banner.png" alt="Blue Mountain Family Forge Concept Art" class="concept-art" onerror="this.style.display='none'">
        
        <h1>Blue Mountain <span class="accent">Family Forge</span></h1>
        <p>Walla Walla's ultimate destination for immersive entertainment is currently under construction. Get ready to level up your family time.</p>
        
        <div class="features">
            <span class="badge">Arcade</span>
            <span class="badge">Soft Play Indoor Playground</span>
            <span class="badge">Escape Rooms</span>
            <span class="badge">Bar & Cafe</span>
        </div>

        <p style="font-size: 1em; color: #888; margin-bottom: 15px;">Follow our build-out journey on social media:</p>
        <a href="#" class="social-link">Follow on Facebook</a>
    </div>

</body>
</html>
